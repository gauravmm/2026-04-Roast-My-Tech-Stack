name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  compile-slides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v3
      - run: typst compile --font-path .fonts --ignore-system-fonts slides.typ slides.pdf
        working-directory: .
      - uses: actions/upload-artifact@v4
        with:
          name: roast-my-tech-stack-slides
          path: slides.pdf
          retention-days: 1

  release:
    needs: [compile-slides]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "name=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          fi
      - name: Stage release assets
        run: |
          cp artifacts/roast-my-tech-stack-slides/slides.pdf roast-my-tech-stack-slides.pdf
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release ${{ steps.tag.outputs.name }}
          body: Compiled slide decks for ${{ steps.tag.outputs.name }}
          fail_on_unmatched_files: true
          files: |
            roast-my-tech-stack-slides.pdf
